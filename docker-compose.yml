version: '3.8'

services:
  evolution-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MANAGER_PORT:-3050}:80"
    container_name: evolution-manager-v2
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - evolution-network

  # Evolution API (imagen pública: evoapicloud/evolution-api; evolutionapi/evolution-api no existe en Docker Hub)
  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "${EVOLUTION_API_PORT:-8080}:${SERVER_PORT:-8080}"
    container_name: evolution-api
    restart: unless-stopped
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:?}:${POSTGRES_DB_PORT:-5432}/${POSTGRES_DB:-evolution}
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY:-your-api-key-here}
      - SERVER_PORT=${SERVER_PORT:-8080}
      # Redis: por defecto la API usa localhost:6379; en Docker el host es el servicio "redis"
      - CACHE_REDIS_ENABLED=${CACHE_REDIS_ENABLED:-true}
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=${CACHE_REDIS_PREFIX_KEY:-evolution}
      # WebSocket (Socket.io): sin esto el cliente no puede usar wss://; en HTTPS configura también el proxy (Upgrade)
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED:-true}
      # Por defecto la API solo permite localhost; en Docker/producción suele hacer falta ampliar (o *).
      - WEBSOCKET_ALLOWED_HOSTS=${WEBSOCKET_ALLOWED_HOSTS:-*}
      # CORS: el manager (origen) debe listarse aquí; * solo en pruebas
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - CORS_METHODS=${CORS_METHODS:-GET,POST,PUT,DELETE,PATCH,OPTIONS}
      - CORS_CREDENTIALS=${CORS_CREDENTIALS:-true}
    depends_on:
      - redis
    networks:
      - evolution-network

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - evolution-network

networks:
  evolution-network:
    driver: bridge
