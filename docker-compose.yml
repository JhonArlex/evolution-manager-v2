version: '3.8'

services:
  evolution-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3050:80"
    container_name: evolution-manager-v2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - evolution-network

  # Evolution API (imagen pública: evoapicloud/evolution-api; evolutionapi/evolution-api no existe en Docker Hub)
  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    container_name: evolution-api
    restart: unless-stopped
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:password@postgres:5432/evolution
      - AUTHENTICATION_API_KEY=your-api-key-here
      - SERVER_PORT=8080
      # Redis: por defecto la API usa localhost:6379; en Docker el host es el servicio "redis"
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
    depends_on:
      - postgres
      - redis
    networks:
      - evolution-network

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - evolution-network

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - evolution-network

networks:
  evolution-network:
    driver: bridge

volumes:
  postgres_data:
